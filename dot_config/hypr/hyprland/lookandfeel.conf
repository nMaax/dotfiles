#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 20

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = $primary $tertiary 90deg
    col.inactive_border = $surface $surface_lowest 90deg

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle # You can also switch to scrolling
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 5
        passes = 2

        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Beziers, see https://wiki.hypr.land/Configuring/Animations/#curves
    bezier = standard, 0.2, 0, 0, 1
    # High velocity start, instant lock-in
    bezier = snappy, 0.3, 1, 0, 1 
    # For exits: starts slow, then vanishes instantly
    bezier = fastOut, 0.3, 0, 1, 1 
    # A cleaner version of MD3 without the bounce
    bezier = fluid, 0.05, 0.7, 0.1, 1 


    # Windows, see https://wiki.hypr.land/Configuring/Animations/
    animation = windowsIn, 1, 3, snappy, popin 80%
    animation = windowsOut, 1, 3, fastOut, popin 80%
    animation = windowsMove, 1, 3, snappy 

    # Layers (UI Elements)
    animation = layersIn, 1, 3, fluid, slide
    animation = layersOut, 1, 3, fastOut, slide
    animation = fadeLayers, 1, 4, standard

    # Workspaces
    animation = workspaces, 1, 4, snappy, slide
    animation = specialWorkspace, 1, 4, snappy, slidefadevert 40%

    # Aesthetics
    animation = fade, 1, 3, standard
    animation = border, 1, 5, standard
}

