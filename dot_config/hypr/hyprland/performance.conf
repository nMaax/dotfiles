###################
### PERFORMANCE ###
###################

# Generally, we have two options:
#   1. Tearing: GPU goes as faster as possible, the monitor grabs the most recent frame. 
#     You should idealy set unlimited framerete in your games.
#   2. Adaptive Sync (VRR): The monitor will wait for the GPU to finish rendering a frame, 
#     and will display it when ready. This is better for a smooth experience, but can introduce 
#     input lag in games. You should idealy set a framerate limit in your games to match your monitor's
#     refresh rate, minus 3~4 FPS to always stay on sync.
#
#   Turning both on is a contradiction, choose your poison. Tearing is better for competitive shooters.

# TODO: should make some LUA logic that optimizes performanc on-the-fly when a game is running, and reverts to normal when the game is closed.
# For competitive gaming on Hyprland, the tweaks that actually matter fall into a few buckets: **input latency**, **tearing/frame timing**, and **cutting rendering overhead**. Here's what's relevant from this options list:
# ## Input latency / mouse precision
# 
# - **`input.accel_profile = "flat"`** — disables pointer acceleration curves so your sensitivity is 1:1, which most competitive players want.
# - **`input.force_no_accel`** — gives the rawest possible mouse signal by bypassing most pointer settings. Note the doc warns this can cause cursor desync, so test it rather than assuming it's strictly better than `flat`.
# - **`input.sensitivity`** — dial in to taste once accel is flat.
# - **`cursor.no_hardware_cursors`** — leave this on its default (`2`, auto), or explicitly set to `0` (use hw cursors). Hardware cursors are lower latency than software-rendered ones; you generally do *not* want `1` (force disable) unless you're hitting cursor bugs.
# - **`cursor.no_warps` / `persistent_warps`** — minor QoL, not really a performance lever.
# 
# ## Tearing / frame timing (biggest FPS-vs-latency lever)
# 
# - **`general.allow_tearing = true`** — the master switch. Without this, tearing can never happen even if a game requests it.
# - **`render.direct_scanout`** — set to `1` (or `2` for auto-on-game-content) to let a fullscreen game bypass compositing almost entirely. This is the single biggest latency win for a fullscreen competitive title.
# - You'll also want a **window rule** setting `immediate` on your game (not in this options page, but pairs with `allow_tearing`) — worth knowing even though it's documented elsewhere.
# - **`misc.vrr`** — if your monitor supports VRR/G-Sync/FreeSync, set to `3` (VRR only for game-content-type windows) rather than blanket `1`, so it doesn't affect your desktop/browser.
# - **`cursor.no_break_fs_vrr`** — default `2` (auto) is fine; keeps cursor movement from causing frame spikes under VRR.
# 
# ## Cutting compositor overhead
# 
# These don't reduce input latency directly, but free up GPU headroom, which matters more on weaker hardware:
# 
# - **`animations.enabled = false`** — no window-open/close/move animation overhead.
# - **`decoration.blur.enabled = false`**, **`decoration.shadow.enabled = false`**, **`decoration.dim_inactive = false`** — blur especially is one of the more expensive effects (multiple passes).
# - **`decoration.rounding = 0`** — trivial cost, but zero is zero.
# - **`misc.render_unfocused_fps`** — cap background window rendering (e.g. Discord, browser) low so it doesn't compete for GPU time while you're focused on the game.
# - **`xwayland.force_zero_scaling = true`** — if your competitive game is X11 (many are, via Proton/native) and your monitor is scaled, this avoids an extra scaling blit, which helps both perf and input lag.
# 
# ## Leave alone / usually not worth touching
# 
# - **`debug.vfr`** — keep the default `true`; disabling it forces constant rendering and just wastes power without helping input lag.
# - **`render.new_render_scheduling`** — triple buffering can raise FPS on weaker GPUs but tends to *add* a frame of latency, which is the opposite of what competitive players want. Skip it unless you're GPU-bound and don't care about the extra lag.
# - **`opengl.nvidia_anti_flicker`** — only relevant if you're on Nvidia and seeing flicker; otherwise no reason to touch it.
# 
# If you tell me your GPU (Nvidia vs AMD/Intel) and whether the games you're playing are native Wayland or Proton/X11, I can narrow this down further — some of these (like tearing + direct scanout) behave differently depending on that.

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = true
}

# https://wiki.hypr.land/Configuring/Basics/Variables/#cursor
cursor {
    no_hardware_cursors = 2 # auto: disable when tearing
    use_cpu_buffer = 2 # auto: enable on NVIDIA, otherwise cursors do not work
    no_break_fs_vrr = 2 # auto: avoid framerate spikes on games
}

# https://wiki.hypr.land/Configuring/Basics/Variables/#render
render {
  direct_scanout = 2 # auto: disable when tearing
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    vrr = 0 # 3 for "auto-for-games": controls the VRR (Adaptive Sync), runs only for fullscreen with video or game content type
}
