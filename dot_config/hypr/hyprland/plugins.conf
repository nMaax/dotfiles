###############
### PLUGINS ###
###############

plugin:dynamic-cursors {

    # Enables the plugin
    enabled = true

    # Set to none because you only want the enlarging effect, not tilt/stretch
    mode = none

    # Configure shake to find
    shake {
        enabled = true

        # How soon a shake is detected (lower is faster)
        threshold = 6.0

        # Magnification level (4.0 makes it 4x larger immediately)
        base = 4.0

        # How fast it keeps growing if you keep shaking
        speed = 4.0

        # How long (ms) it stays big after you stop shaking
        timeout = 2000

        # Disable effects like tilt while shaking for a cleaner look
        effects = false
    }

    # High-resolution support for the enlarged cursor
    hyprcursor {
        enabled = true
        # 1 / true means it will use pixelated scaling ONLY if a high-res image isn't found
        nearest = true
        # Force it to render the SVG at a huge size (e.g., 128 or 256) so it never blurs
        resolution = 256
        fallback = clientside
    }
}
