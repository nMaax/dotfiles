###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
# see https://wiki.hypr.land/Configuring/Binds/ for more
# See https://docs.noctalia.dev/getting-started/keybinds/
# see https://github.com/blackbartblues/cheatsheet-noctalia-plugin for more
$ipc = qs -c noctalia-shell ipc call

# 1. MAIN BINDS
bind = SUPER, Return, exec, $terminal #"Open terminal"
bind = SUPER, Q, killactive, #"Kill active window"
bind = SUPER SHIFT, Q, exec, hyprctl kill #"Kill (stubborn) window under crossair"
bind = SUPER, F, fullscreen #"Go fullscreen"
bind = SUPER SHIFT, F, togglefloating #"Make active window to float"
bind = SUPER, R, exec, hyprctl keyword general:layout "dwindle" #"Enter dwindle mode"
bind = SUPER SHIFT, R, exec, hyprctl keyword general:layout "scrolling" #"Enter scrolling mode"

# Dwindle only
bind = SUPER, Y, layoutmsg, togglesplit #"Switch split orientation (dwindle only)"
bind = SUPER, U, pseudo, #"Make active window to pseudo (dwinde only)"

# Noctalia binds
bind = ALT, SPACE, exec, $ipc launcher toggle #"Search for apps"
bind = SUPER, V, exec, $ipc plugin:clipper toggle #"Open clipboard"
bind = SUPER, period, exec, $ipc launcher emoji #"Open emoji picker"
bind = SUPER SHIFT, period, exec, $ipc plugin:kaomoji toggle #"Open kaomoji picker"
bind = SUPER, BACKSPACE, exec, $ipc lockScreen lock #"Lockscreen"
bind = SUPER, W, exec, $ipc wallpaper toggle #"Open wallpaper and colorscheme selector"
bind = SUPER SHIFT, W, exec, $ipc plugin:videowallpaper openPanel #"Open animated wallpaper selector"
bind = SUPER, P, exec, $ipc controlCenter toggle #"Open noctalia panel"
bind = SUPER SHIFT, P, exec, $ipc media toggle #"Open media panel"
bind = SUPER ALT, P, exec, $ipc settings toggle #"Open settings panel"
bind = SUPER, F1, exec, $ipc plugin:keybind-cheatsheet toggle #"Show this helping cheatsheet"
bind = SUPER, Escape, exec, $ipc sessionMenu toggle #"Open power/reboot menu"

# 2. APPS
bind = SUPER, B, exec, $browser #"Open the browser"
bind = SUPER, N, exec, ghostty -e nvim #"Open neovim"
bind = SUPER, E, exec, $fileManager #"Open file manager""
bind = SUPER SHIFT, M, exec, spotify #"Open spotify"
bind = SUPER SHIFT, D, exec, discord #"Open discord"
bind = SUPER SHIFT, T, exec, Telegram #"Open telegram"
bind = SUPER SHIFT, G, exec, steam #"Open steam"
bind = SUPER SHIFT, B, exec, ghostty -e btop #"Open btop"

# 3. SCREENSHOTS
bind = , PRINT, exec, hyprshot -m output -o ~/Pictures/Screenshots #"Take screenshot of the entire screen"
bind = SUPER, PRINT, exec, hyprshot -m region -o ~/Pictures/Screenshots #"Take screenshot of a selected region"
bind = SUPER SHIFT, PRINT, exec, hyprshot -m window -o ~/Pictures/Screenshots #"Take screenshot of the active window"

# 4. MOVE AROUND (arrows and vim-like)
# Move focus with vim keys
bind = SUPER, H, movefocus, l #"Move focus left"
bind = SUPER, left, movefocus, l #"Move focus left"
bind = SUPER, L, movefocus, r #"Move focus right"
bind = SUPER, right, movefocus, r #"Move focus right"
bind = SUPER, K, movefocus, u #"Move focus up"
bind = SUPER, up, movefocus, u #"Move focus up"
bind = SUPER, J, movefocus, d #"Move focus down"
bind = SUPER, down, movefocus, d #"Move focus down"

# Access workspaces with numbers
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10 #"Access workspace [0-9]"

# Toggle special workspaces
bind = SUPER, Delete, exec, ~/.local/bin/hypr-toggle.py sysmon #"Access system monitors special workspaces"
bind = SUPER, C, exec, ~/.local/bin/hypr-toggle.py communication #"Access communication special workspace"
bind = SUPER, M, exec, ~/.local/bin/hypr-toggle.py music #"Access music special workspace"
bind = SUPER, G, exec, ~/.local/bin/hypr-toggle.py games #"Access game launchers special workspace"
bind = SUPER, A, exec, ~/.local/bin/hypr-toggle.py audio #"Access audio special workspace"
bind = SUPER, S, togglespecialworkspace, magic #"Access scratchpad"

# Scroll workspaces with arrows and vim-keys
bind = SUPER CTRL, H, workspace, -1 #"Scroll workspaces to the left"
bind = SUPER CTRL, left, workspace, -1 #"Scroll workspaces to the left"
bind = SUPER CTRL, L, workspace, +1 #"Scroll workspaces to the right"
bind = SUPER CTRL, right, workspace, +1 #"Scroll workspaces to the right"

# Scroll workspaces with mouse wheel
bind = SUPER, mouse_down, workspace, e+1 #"Scroll workspaces with mouse scroll wheel"
bind = SUPER, mouse_up, workspace, e-1

# Scroll workspaces with mouse side buttons (4 and 5)
bind = SUPER, mouse:276, workspace, e+1 #"Scroll workspace with mouse 4 and 5"
bind = SUPER , mouse:275, workspace, e-1

# Move windows to workspaces with numbers
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10 #"Move window to workspace [0-9]"
bind = SUPER CTRL SHIFT, L, movetoworkspace, +1 #"Move window to right workspace"
bind = SUPER CTRL SHIFT, right, movetoworkspace, +1 #"Move window to right workspace"
bind = SUPER CTRL SHIFT, H, movetoworkspace, -1 #"Move window to left workspace"
bind = SUPER CTRL SHIFT, left, movetoworkspace, -1 #"Move window to left workspace"

# Move windows to scratchpad
bind = SUPER SHIFT, S, movetoworkspace, special:magic #"Move window to scratchpad"

# Re-arrange windows with arrows and vim-keys
bind = SUPER SHIFT, H, movewindow, l #"Move window to left"
bind = SUPER SHIFT, left, movewindow, l #"Move window to left"
bind = SUPER SHIFT, L, movewindow, r #"Move window to right"
bind = SUPER SHIFT, right, movewindow, r #"Move window to right"
bind = SUPER SHIFT, K, movewindow, u #"Move window up"
bind = SUPER SHIFT, up, movewindow, u #"Move window up"
bind = SUPER SHIFT, J, movewindow, d #"Move window down"
bind = SUPER SHIFT, down, movewindow, d #"Move window down"

# Re-size windows with +/- (use Equal instead of Plus in US Keyboard) or mouse
binde = Super, Minus, resizeactive, -10% 0 #"Resize widow to the left""
binde = Super, Plus, resizeactive, 10% 0 #"Resize window to right"
binde = Super, Equal, resizeactive, 10% 0
binde = SUPER SHIFT, Minus, resizeactive, 0 -10% #"Resize window up"
binde = SUPER SHIFT, Plus, resizeactive, 0 10%  #"Resize window down"
binde = SUPER SHIFT, Equal, resizeactive, 0 10%
bindm = SUPER, mouse:272, movewindow #"Re-arrange windows with mouse"
bindm = SUPER, mouse:273, resizewindow #"Re-size windows with mouse"

# Manage external monitors
bind = SUPER ALT, up,  focusmonitor, u  #"Move focus on monitor up"
bind = SUPER ALT, down, focusmonitor, d  #"Move focus on monitor down"
bind = SUPER ALT, left,  focusmonitor, l  #"Move focus on monitor left"
bind = SUPER ALT, right,  focusmonitor, r  #"Move focus on monitor right"

# Show all open workspaces
bind = Super, TAB, exec, qs ipc -c overview call overview toggle

# 5. MULTIMEDIA
# Laptop multimedia keys for volume and LCD brightness
bind = SUPER SHIFT, A, exec, $ipc volume togglePanel 
bindel = , XF86AudioRaiseVolume, exec, $ipc volume increase
bindel = , XF86AudioLowerVolume, exec, $ipc volume decrease
bindl  = , XF86AudioMute, exec, $ipc volume muteOutput
bindl  = , XF86AudioMicMute, exec, $ipc volume muteInput
bindel = , XF86MonBrightnessUp, exec, $ipc brightness increase
bindel = , XF86MonBrightnessDown, exec, $ipc brightness decrease
bindl = SUPER, XF86AudioMute, exec, wpctl set-default "$(pw-dump | get-next-sink)" #"Switch audio device"

# Laptop multimedia keys for play/pause and next/prev
bindl = , XF86AudioNext, exec, $ipc media next
bindl = , XF86AudioPause, exec, $ipc media playPause
bindl = , XF86AudioPlay, exec, $ipc media playPause
bindl = , XF86AudioPrev, exec, $ipc media previous

