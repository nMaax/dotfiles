# Noctalia-generated color variables for Hyprland.
# This file is automatically overwritten by Noctalia when it applies the
# "hyprland" template. It contains safe fallback values (Rosey AMOLED dark)
# so Hyprland can start on a fresh machine before Noctalia has run for the
# first time.

$primary       = rgba(ff8cb3ff)
$onPrimary     = rgba(000000ff)
$secondary     = rgba(ffb3ccff)
$onSecondary   = rgba(000000ff)
$tertiary      = rgba(ffcce0ff)
$onTertiary    = rgba(000000ff)
$error         = rgba(ff99b8ff)
$onError       = rgba(000000ff)
$surface       = rgba(000000ff)
$onSurface     = rgba(ffe0ebff)
$surface_container = rgba(1a0f16ff)
$surface_lowest = rgba(1a0f16ff)
$onSurfaceVariant = rgba(ff8cb3ff)
$outline       = rgba(5a3f4dff)
$shadow        = rgba(000000ff)
