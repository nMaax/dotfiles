# Handy programs
$terminal = ghostty
$fileManager = dolphin
$browser = zen-browser

# Colors first
source = ~/.config/hypr/noctalia/noctalia-colors.conf

# Then all my configs
source = ~/.config/hypr/hyprland/autostart.conf
source = ~/.config/hypr/hyprland/env.conf
source = ~/.config/hypr/hyprland/permissions.conf
source = ~/.config/hypr/hyprland/monitors.conf
source = ~/.config/hypr/hyprland/lookandfeel.conf
source = ~/.config/hypr/hyprland/input.conf
source = ~/.config/hypr/hyprland/keybindings.conf
source = ~/.config/hypr/hyprland/rules.conf
