###############
### WINDOWS ###
###############

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

# Music workspace
windowrule {
    name = music-workspace
    # Using [Ss]potify handles both 'Spotify' and 'spotify'
    match:class = ^([Ss]potify|feishin|Supersonic|Cider|com.github.th_ch.youtube_music|Plexamp)$
    # Catching the title just in case the class is empty
    match:initial_title = ^Spotify( (Premium|Free))?$
    workspace = special:music
}

# Communication workspace
windowrule {
    name = comms-workspace
    match:class = ^(discord|equibop|vesktop|org.telegram.desktop|whatsapp|Element)$
    workspace = special:comm
}

# Game Launchers Workspace
windowrule {
    name = games-launchers
    # Matches Steam, Lutris, and Heroic (com.heroicgameslauncher.hgl)
    match:class = ^(steam|lutris|com.heroicgameslauncher.hgl|heroic)$
    workspace = special:games
}

# IMPORTANT: Ensure actual games open on the active workspace, NOT the special one
windowrule {
    name = stay-on-main-workspace
    # Steam games usually have a class starting with "steam_app_"
    match:class = ^(steam_app_.*)$
    workspace = unset
}

# Small utilities (only calculator for now)
windowrule {
    name = gnome-calculator
    match:class = ^(org\.gnome\.Calculator)$

    # Small, floating, and pinned regardless of the workspace
    float = yes
    size = 400 600
    center = yes
    pin = yes
}
