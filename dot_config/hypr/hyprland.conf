autogenerated = 0 # remove this line to remove the warning

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
source = ~/.config/hypr/noctalia/noctalia-colors.conf


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
# Syntax: monitor = name, res@hz, position, scale

# Monitors
$laptop = eDP-1

# Primary Monitor
monitor = $laptop, 1920x1080@144, 0x0, 1

# Specific Profiles
monitor = desc:AOC 27B36X 2RRRAHA013122, 1920x1080@144, auto-up, 1
monitor = desc:AOC 27B36X 2RRRAHA013116, 1920x1080@144, auto-up, 1
monitor = desc:ASUSTek COMPUTER INC XG27AQDMGR T9LMTF126923, 1920x1080@50.00, auto-up, 1
monitor = desc:Ancor Communications Inc ASUS VN247 G2LMTF057181, 1920x1080@60.00, auto-up, 1
monitor = desc:Ancor Communications Inc ASUS VN247 F1LMTF033327, 1920x1080@60.00, auto-right, 1
monitor = desc:OOO YZ2748, 1920x1080@60.00, auto-up, 1

# Fallback
monitor = , preferred, auto-up, 1

###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = ghostty
$fileManager = dolphin
$browser = zen-browser


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch

exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = qs -c noctalia-shell
exec-once = pkill -9 wl-paste; wl-paste --watch cliphist store &

# Ensure D-Bus and systemd know about the Wayland session
#exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Start the KWallet daemon
#exec-once = /usr/lib/pam_kwallet_init

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XDG_MENU_PREFIX,arch-
env = QT_QPA_PLATFORMTHEME, qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

###################
### PERMISSIONS ###
###################

